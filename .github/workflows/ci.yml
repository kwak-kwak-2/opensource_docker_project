name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: kwakminjae
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: kwakminjae/mlops-image-api:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy Container
        run: |
          if (docker ps -a -q --filter "name=mlops-container") { docker stop mlops-container; docker rm mlops-container }
          docker pull kwakminjae/mlops-image-api:latest
          docker run -d --name mlops-container -p 8000:8000 kwakminjae/mlops-image-api:latest
        shell: powershell
        